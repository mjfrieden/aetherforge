name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cumulonimbus-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require Cloudflare token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is not configured."
            exit 1
          fi

      - name: Verify Cloudflare auth
        run: npx wrangler whoami

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Apply remote migrations
        run: npm run migrate:remote

      - name: Deploy Cloudflare Pages
        run: npx wrangler pages deploy public --project-name aetherforge --branch main
