<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | Cumulonimbus</title>
    <script type="module" crossorigin src="/assets/api-2BZ-9_vN.js"></script>
    <script type="module" crossorigin src="/assets/auth-page-8Gs0wGNT.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/styles-BuREHFlk.css">
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-art auth-art-register" aria-label="Cumulonimbus registration art">
        <p class="eyebrow">Cumulonimbus</p>
        <h1>Build Your First Replay Model</h1>
        <p>Start with paper capital, train on resolved outcomes, and compete without risking live funds.</p>
      </section>
      <section class="auth-panel" aria-label="Registration form">
        <p class="eyebrow">Register</p>
        <h2>New Trader</h2>
        <form id="auth-form" data-mode="register" autocomplete="on">
          <label>
            Display name
            <input id="display-name" name="display_name" type="text" autocomplete="nickname" maxlength="40" required>
          </label>
          <label>
            Email
            <input id="email" name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="new-password" required>
          </label>
          <button type="submit">Create Account</button>
        </form>
        <p class="status" id="auth-status"></p>
        <p class="auth-switch">Already have a desk? <a href="/login">Login</a></p>
      </section>
    </main>
  </body>
</html>
